# ─────────────────────────────────────────────────────────────────────────────
# Gridwolf — OVA build workflow
#
# Triggers on every v*.*.* release tag AFTER docker-hub.yml succeeds.
# Produces an .ova file and attaches it to the GitHub release as an asset.
#
# Required secrets:
#   DOCKERHUB_USERNAME   — used to pull the just-published images into the OVA
# ─────────────────────────────────────────────────────────────────────────────

name: Build OVA

on:
  workflow_run:
    workflows: ["Build & Push to Docker Hub"]
    types: [completed]
    branches-ignore: []

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      version:
        description: "Gridwolf version tag (e.g. v0.9.8)"
        required: true
        default: "latest"

jobs:
  build-ova:
    name: Packer OVA
    # Only run when the Docker Hub workflow succeeded (or manual dispatch)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install VirtualBox
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends virtualbox

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "1.11.0"

      - name: Packer init
        run: packer init packer/gridwolf.pkr.hcl

      - name: Packer build
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GRIDWOLF_VERSION:   ${{ steps.ver.outputs.version }}
        run: |
          packer build \
            -var "gridwolf_version=${GRIDWOLF_VERSION}" \
            -var "dockerhub_username=${DOCKERHUB_USERNAME}" \
            packer/gridwolf.pkr.hcl

      - name: Compress OVA
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          OVA=$(ls output/*.ova | head -1)
          mv "$OVA" "output/gridwolf-${VERSION}-amd64.ova"
          gzip -9 "output/gridwolf-${VERSION}-amd64.ova"

      - name: Upload OVA to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/gridwolf-*.ova.gz
          tag_name: ${{ steps.ver.outputs.version }}
