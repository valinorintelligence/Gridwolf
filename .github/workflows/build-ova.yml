name: Build Gridwolf OVA

# Triggered when an OVA-bearing release tag is pushed (e.g. release/v1.1.0).
# Plain `v*` tags do NOT trigger this workflow — that lets us cut Docker-only
# point releases without paying for a 30-min appliance rebuild.
on:
  push:
    tags:
      - "release/v*"
  workflow_dispatch:
    inputs:
      gridwolf_version:
        description: "Gridwolf image tag to bake into the OVA (e.g. 1.1.0)"
        required: true
        default: "latest"

permissions:
  contents: write   # required for softprops/action-gh-release

jobs:
  build-ova:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Gridwolf version from tag or input
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.gridwolf_version }}"
          else
            # tag form: refs/tags/release/v1.1.0  → 1.1.0
            VER="${GITHUB_REF##*/v}"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Building OVA for Gridwolf ${VER}"

      - name: Enable KVM acceleration on the runner
        # GitHub-hosted ubuntu-24.04 runners expose /dev/kvm but the default
        # udev rule denies access to the runner user. Standard fix per
        # https://github.blog/changelog/2023-02-23-hardware-accelerated-android-virtualization-on-actions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Install Packer + qemu toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
              qemu-system-x86 qemu-utils ovmf \
              gnupg software-properties-common
          curl -fsSL https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq packer
          packer version
          qemu-img --version

      - name: packer init
        working-directory: deploy/ova/packer
        run: packer init .

      - name: packer build
        working-directory: deploy/ova/packer
        env:
          PACKER_LOG: "1"
        run: |
          packer build \
            -var "gridwolf_version=${{ steps.ver.outputs.version }}" \
            gridwolf.pkr.hcl

      - name: Locate and rename artifact
        id: artifact
        working-directory: deploy/ova/packer/build
        run: |
          shopt -s nullglob
          OVA=( *.ova )
          [ ${#OVA[@]} -eq 1 ] || { echo "expected exactly one .ova, found ${#OVA[@]}"; ls -la; exit 1; }
          NEW="gridwolfOS-${{ steps.ver.outputs.version }}.ova"
          mv "${OVA[0]}"        "${NEW}"
          mv "${OVA[0]}.sha256" "${NEW}.sha256" 2>/dev/null || sha256sum "${NEW}" > "${NEW}.sha256"
          ls -lh "${NEW}" "${NEW}.sha256"
          echo "path=deploy/ova/packer/build/${NEW}" >> "$GITHUB_OUTPUT"
          echo "sha256=deploy/ova/packer/build/${NEW}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload OVA as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gridwolfOS-${{ steps.ver.outputs.version }}
          path: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.sha256 }}
          retention-days: 14
          if-no-files-found: error

      - name: Create draft GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Gridwolf v${{ steps.ver.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.sha256 }}
