# ─────────────────────────────────────────────────────────────────────────────
# Gridwolf — Docker Hub multi-arch build & push
#
# Triggers:
#   • Push of any  v*.*.*  tag  →  builds :latest + :<version>
#   • Manual workflow dispatch  →  builds :edge
#
# Required GitHub repository secrets:
#   DOCKERHUB_USERNAME   — Docker Hub user / org (e.g. gridwolf)
#   DOCKERHUB_TOKEN      — Docker Hub access token (not your password)
#
# Images produced:
#   gridwolf/backend:<version>   linux/amd64  linux/arm64
#   gridwolf/frontend:<version>  linux/amd64  linux/arm64
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Push to Docker Hub

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag suffix (default: edge)"
        required: false
        default: "edge"

env:
  BACKEND_IMAGE:  ${{ secrets.DOCKERHUB_USERNAME }}/backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/frontend

jobs:
  # ── Derive the tag names ───────────────────────────────────────────────────
  meta:
    name: Resolve image tags
    runs-on: ubuntu-latest
    outputs:
      version:  ${{ steps.tag.outputs.version }}
      is_semver: ${{ steps.tag.outputs.is_semver }}
    steps:
      - id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME}"          # e.g. v0.9.8
          else
            VERSION="${{ github.event.inputs.tag || 'edge' }}"
          fi
          IS_SEMVER=$([[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]] && echo "true" || echo "false")
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "is_semver=$IS_SEMVER" >> "$GITHUB_OUTPUT"

  # ── Backend image ──────────────────────────────────────────────────────────
  backend:
    name: Backend — ${{ needs.meta.outputs.version }}
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}},enable=${{ needs.meta.outputs.is_semver }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.meta.outputs.is_semver }}
            type=raw,value=latest,enable=${{ needs.meta.outputs.is_semver }}
            type=raw,value=${{ needs.meta.outputs.version }},enable=${{ needs.meta.outputs.is_semver == 'false' }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Frontend image ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend — ${{ needs.meta.outputs.version }}
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}},enable=${{ needs.meta.outputs.is_semver }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.meta.outputs.is_semver }}
            type=raw,value=latest,enable=${{ needs.meta.outputs.is_semver }}
            type=raw,value=${{ needs.meta.outputs.version }},enable=${{ needs.meta.outputs.is_semver == 'false' }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Summary comment on the GitHub release ─────────────────────────────────
  release-note:
    name: Annotate GitHub release
    needs: [meta, backend, frontend]
    if: needs.meta.outputs.is_semver == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.meta.outputs.version }}';
            const user    = '${{ secrets.DOCKERHUB_USERNAME }}';
            const body = [
              `## 🐳 Docker Hub images`,
              ``,
              `\`\`\`bash`,
              `# Quick-start (no source needed)`,
              `curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.hub.yml`,
              `curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/.env.example`,
              `cp .env.example .env   # edit: set SECRET_KEY and POSTGRES_PASSWORD`,
              `docker compose -f docker-compose.hub.yml up -d`,
              `\`\`\``,
              ``,
              `| Image | Tag |`,
              `|---|---|`,
              `| \`${user}/backend\`  | \`${version}\` / \`latest\` |`,
              `| \`${user}/frontend\` | \`${version}\` / \`latest\` |`,
              ``,
              `Platforms: \`linux/amd64\` · \`linux/arm64\``,
            ].join('\n');

            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            const release = releases.data.find(r => r.tag_name === version);
            if (release) {
              await github.rest.repos.updateRelease({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                release_id: release.id,
                body:       release.body + '\n\n' + body,
              });
            }
