# ─────────────────────────────────────────────────────────────────────────────
# Gridwolf — GHCR multi-arch build, push & keyless cosign signing
#
# Triggers:
#   • Push of any  v*.*.*  tag  →  builds :latest + :<version>, signs both
#   • Manual workflow dispatch  →  builds :edge (unsigned)
#
# Registry: ghcr.io  (no external account required — uses GITHUB_TOKEN)
#
# Images produced:
#   ghcr.io/valinorintelligence/gridwolf-backend:<version>   amd64+arm64 (signed)
#   ghcr.io/valinorintelligence/gridwolf-frontend:<version>  amd64+arm64 (signed)
#
# Verification (consumer side):
#   cosign verify ghcr.io/valinorintelligence/gridwolf-backend:1.1.0 \
#     --certificate-identity-regexp='^https://github.com/valinorintelligence/Gridwolf' \
#     --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Push Container Images (GHCR)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag suffix (default: edge)"
        required: false
        default: "edge"

env:
  REGISTRY:        ghcr.io
  BACKEND_IMAGE:   ghcr.io/valinorintelligence/gridwolf-backend
  FRONTEND_IMAGE:  ghcr.io/valinorintelligence/gridwolf-frontend
  COSIGN_YES:      "true"

jobs:
  meta:
    name: Resolve image tags
    runs-on: ubuntu-latest
    outputs:
      version:   ${{ steps.tag.outputs.version }}
      is_semver: ${{ steps.tag.outputs.is_semver }}
    steps:
      - id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.tag || 'edge' }}"
          fi
          IS_SEMVER=$([[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]] && echo "true" || echo "false")
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "is_semver=$IS_SEMVER" >> "$GITHUB_OUTPUT"

  backend:
    name: Backend — ${{ needs.meta.outputs.version }}
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Install cosign
        if: needs.meta.outputs.is_semver == 'true'
        uses: sigstore/cosign-installer@v3
        with: { cosign-release: v2.2.4 }

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}},enable=${{ needs.meta.outputs.is_semver }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.meta.outputs.is_semver }}
            type=raw,value=latest,enable=${{ needs.meta.outputs.is_semver }}
            type=raw,value=${{ needs.meta.outputs.version }},enable=${{ needs.meta.outputs.is_semver == 'false' }}

      - name: Build & push backend
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Sign backend image (keyless OIDC via Sigstore)
        if: needs.meta.outputs.is_semver == 'true'
        env:
          TAGS:   ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          echo "${TAGS}" | while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done

  frontend:
    name: Frontend — ${{ needs.meta.outputs.version }}
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Install cosign
        if: needs.meta.outputs.is_semver == 'true'
        uses: sigstore/cosign-installer@v3
        with: { cosign-release: v2.2.4 }

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}},enable=${{ needs.meta.outputs.is_semver }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.meta.outputs.is_semver }}
            type=raw,value=latest,enable=${{ needs.meta.outputs.is_semver }}
            type=raw,value=${{ needs.meta.outputs.version }},enable=${{ needs.meta.outputs.is_semver == 'false' }}

      - name: Build & push frontend
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Sign frontend image (keyless OIDC via Sigstore)
        if: needs.meta.outputs.is_semver == 'true'
        env:
          TAGS:   ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          echo "${TAGS}" | while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done

  release-note:
    name: Annotate GitHub release
    needs: [meta, backend, frontend]
    if: needs.meta.outputs.is_semver == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.meta.outputs.version }}';
            const repo    = '${{ github.repository }}';
            const backend  = 'ghcr.io/valinorintelligence/gridwolf-backend';
            const frontend = 'ghcr.io/valinorintelligence/gridwolf-frontend';
            const body = [
              `## 🐳 Container images (GHCR)`,
              ``,
              `\`\`\`bash`,
              `# Quick-start (no source needed)`,
              `curl -O https://raw.githubusercontent.com/${repo}/main/docker-compose.hub.yml`,
              `curl -O https://raw.githubusercontent.com/${repo}/main/.env.example`,
              `cp .env.example .env   # edit: set SECRET_KEY and POSTGRES_PASSWORD`,
              `docker compose -f docker-compose.hub.yml up -d`,
              `\`\`\``,
              ``,
              `| Image | Tag | Platforms |`,
              `|---|---|---|`,
              `| \`${backend}\`  | \`${version}\` / \`latest\` | \`linux/amd64\` · \`linux/arm64\` |`,
              `| \`${frontend}\` | \`${version}\` / \`latest\` | \`linux/amd64\` · \`linux/arm64\` |`,
              ``,
              `### 🔐 Verify signatures (cosign keyless)`,
              ``,
              `\`\`\`bash`,
              `cosign verify ${backend}:${version} \\`,
              `  --certificate-identity-regexp='^https://github.com/${repo}' \\`,
              `  --certificate-oidc-issuer='https://token.actions.githubusercontent.com'`,
              `\`\`\``,
              ``,
              `Images are signed keyless via Sigstore. Provenance + SBOM attestations attached.`,
            ].join('\n');

            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            const release = releases.data.find(r => r.tag_name === version);
            if (release) {
              await github.rest.repos.updateRelease({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                release_id: release.id,
                body:       (release.body || '') + '\n\n' + body,
              });
            }
