{{- if and .Values.secrets.createSecret (not .Values.secrets.existingSecret) }}
{{- $secretName := include "gridwolf.fullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $secretKey := .Values.secrets.secretKey | default (index ($existing | default dict).data "GRIDWOLF_SECRET_KEY" | default "" | b64dec) | default (randAlphaNum 64) }}
{{- $postgresPw := .Values.secrets.postgresPassword | default (index ($existing | default dict).data "POSTGRES_PASSWORD" | default "" | b64dec) | default (randAlphaNum 32) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "gridwolf.labels" . | nindent 4 }}
type: Opaque
stringData:
  GRIDWOLF_SECRET_KEY: {{ $secretKey | quote }}
  POSTGRES_PASSWORD: {{ $postgresPw | quote }}
  {{- with .Values.secrets.adminPassword }}
  GRIDWOLF_ADMIN_PASSWORD: {{ . | quote }}
  {{- end }}
{{- end }}
