# ─────────────────────────────────────────────────────────────────────────────
# Gridwolf ICS/OT Security Platform  —  Quick-Start (Docker Hub)
#
# Pulls pre-built images — no source code needed.
#
#   curl -O https://raw.githubusercontent.com/valinorintelligence/Gridwolf/main/docker-compose.hub.yml
#   curl -O https://raw.githubusercontent.com/valinorintelligence/Gridwolf/main/.env.example
#   cp .env.example .env   # then edit .env — set SECRET_KEY and POSTGRES_PASSWORD
#   docker compose -f docker-compose.hub.yml up -d
#
# Access: http://localhost
# API Docs: http://localhost/api/docs
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gridwolf
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env  (openssl rand -hex 32)}"
      POSTGRES_DB: gridwolf
    volumes:
      - gridwolf_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridwolf"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  backend:
    image: "${GRIDWOLF_IMAGE:-gridwolf/backend:latest}"
    pull_policy: always
    environment:
      GRIDWOLF_DATABASE_URL: "postgresql+asyncpg://gridwolf:${POSTGRES_PASSWORD:?}@postgres:5432/gridwolf"
      GRIDWOLF_REDIS_URL: "redis://redis:6379/0"
      GRIDWOLF_SECRET_KEY: "${GRIDWOLF_SECRET_KEY:?Set GRIDWOLF_SECRET_KEY in .env}"
      GRIDWOLF_CORS_ORIGINS: "${GRIDWOLF_CORS_ORIGINS:-[\"http://localhost\"]}"
      GRIDWOLF_DEBUG: "false"
      GRIDWOLF_UPLOAD_DIR: "/data/uploads"
      GRIDWOLF_REPORTS_DIR: "/data/reports"
    volumes:
      - gridwolf_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    image: "${GRIDWOLF_FRONTEND_IMAGE:-gridwolf/frontend:latest}"
    pull_policy: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  gridwolf_db:
  gridwolf_data:
