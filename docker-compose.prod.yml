# Gridwolf - Production Docker Setup (PostgreSQL + Redis)
# Usage: docker compose -f docker-compose.prod.yml up --build
# UI: http://localhost:3000  |  API: http://localhost:8000/docs

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gridwolf
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-gridwolf}"
      POSTGRES_DB: gridwolf
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridwolf"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      GRIDWOLF_DATABASE_URL: "postgresql+asyncpg://gridwolf:${POSTGRES_PASSWORD:-gridwolf}@postgres:5432/gridwolf"
      GRIDWOLF_REDIS_URL: redis://redis:6379/0
      GRIDWOLF_SECRET_KEY: "${GRIDWOLF_SECRET_KEY}"
      GRIDWOLF_CORS_ORIGINS: '["http://localhost:3000"]'
      GRIDWOLF_DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      GRIDWOLF_DATABASE_URL: "postgresql+asyncpg://gridwolf:${POSTGRES_PASSWORD:-gridwolf}@postgres:5432/gridwolf"
      GRIDWOLF_REDIS_URL: redis://redis:6379/0
      GRIDWOLF_SECRET_KEY: "${GRIDWOLF_SECRET_KEY}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
