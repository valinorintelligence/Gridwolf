# Gridwolf - Simple Docker Setup (SQLite, no external dependencies)
# Usage: docker compose up --build
# UI: http://localhost:3000  |  API: http://localhost:8000/docs

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      GRIDWOLF_DATABASE_URL: "sqlite+aiosqlite:///./data/gridwolf.db"
      GRIDWOLF_SECRET_KEY: "gridwolf-local-dev-key"
      GRIDWOLF_CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:5174"]'
      GRIDWOLF_DEBUG: "true"
    volumes:
      - gridwolf_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  gridwolf_data:
